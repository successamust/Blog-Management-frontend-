<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Nexus">
  <defs>
    <linearGradient id="nexus-icon-a" x1="8%" y1="18%" x2="72%" y2="92%">
      <stop offset="0%" stop-color="#7AEDA3"/>
      <stop offset="38%" stop-color="#4FD67A"/>
      <stop offset="100%" stop-color="#2A9D4A"/>
    </linearGradient>
    <linearGradient id="nexus-icon-b" x1="92%" y1="22%" x2="28%" y2="88%">
      <stop offset="0%" stop-color="#5FE08A"/>
      <stop offset="50%" stop-color="#3ACC4D"/>
      <stop offset="100%" stop-color="#248A47"/>
    </linearGradient>
    <filter id="nexus-icon-shadow" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#06281A" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Twin organic lobes + shared center (same Nexus motif as before: connection / hub), drawn as two smooth closed paths -->
  <g filter="url(#nexus-icon-shadow)">
    <path
      fill="url(#nexus-icon-a)"
      d="M 64 24
         C 38 24 18 42 18 66
         C 18 88 34 104 56 106
         C 52 96 50 84 54 72
         C 58 58 72 48 88 46
         C 82 32 74 24 64 24 Z"/>
    <path
      fill="url(#nexus-icon-b)"
      d="M 64 24
         C 90 24 110 42 110 66
         C 110 88 94 104 72 106
         C 76 96 78 84 74 72
         C 70 58 56 48 40 46
         C 46 32 54 24 64 24 Z"/>
  </g>
</svg>
